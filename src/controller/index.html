<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive Sync Controller</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Archive Sync Controller</h1>
        <p class="subtitle">TabSync Mode - MVP Bootstrap</p>
      </header>

      <section class="panel">
        <h2>Tab Scan</h2>
        <div class="row">
          <label for="scanScope">Scope</label>
          <select id="scanScope">
            <option value="all-windows">All Windows</option>
            <option value="current-window">Current Window</option>
          </select>
          <button id="scanTabsBtn" type="button">Scan</button>
        </div>
        <ul id="candidateTabs" class="list"></ul>
      </section>

      <section class="panel">
        <h2>Session Routes</h2>
        <div class="row controls-row">
          <button id="refreshSessionBtn" type="button">Refresh Session</button>
          <button id="playAllBtn" type="button">Play All</button>
          <button id="pauseAllBtn" type="button">Pause All</button>
          <button id="syncNowBtn" type="button">Sync Now (Status Pull)</button>
        </div>
        <ul id="sessionRoutes" class="list"></ul>
      </section>

      <footer class="status-bar">
        <span id="statusText">Ready.</span>
      </footer>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
